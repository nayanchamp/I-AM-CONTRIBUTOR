name: Validate Contributor

on:
  pull_request:
    paths:
      - contributors.json

jobs:
  validate:
    name: Validate contributors.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run schema validator
        run: node .github/scripts/validate.mjs

      - name: Check no contributors were removed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git show origin/${{ github.base_ref }}:contributors.json > /tmp/base-contributors.json
          node .github/scripts/check-no-removals.mjs /tmp/base-contributors.json contributors.json

      - name: Check no duplicate usernames against main
        run: node .github/scripts/check-no-duplicate-against-base.mjs /tmp/base-contributors.json contributors.json
